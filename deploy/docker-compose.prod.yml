# =============================================================================
# Production Docker Compose — IQON-IA LMS Platform
# =============================================================================
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.production up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - iqon-network

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iqon-network

  # ---------------------------------------------------------------------------
  # API — Koa.js Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - iqon-network

  # ---------------------------------------------------------------------------
  # App — Vue.js Frontend (nginx)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
      target: production
      args:
        VITE_API_URL: https://api.iqon-ia.com
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - iqon-network

  # ---------------------------------------------------------------------------
  # Landing — Astro (nginx)
  # ---------------------------------------------------------------------------
  landing:
    build:
      context: ..
      dockerfile: docker/landing/Dockerfile
      target: production
    restart: unless-stopped
    networks:
      - iqon-network

  # ---------------------------------------------------------------------------
  # Caddy — Reverse Proxy
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - app
      - landing
    networks:
      - iqon-network

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - caddy
    networks:
      - iqon-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

# =============================================================================
# Networks
# =============================================================================
networks:
  iqon-network:
    driver: bridge
