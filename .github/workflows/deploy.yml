name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/iqon-ia
  COMPOSE_FILE: deploy/docker-compose.prod.yml

jobs:
  # =============================================================================
  # Deploy to VPS via SSH
  # =============================================================================
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://iqon-ia.com
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            git pull origin main
            docker compose -f ${{ env.COMPOSE_FILE }} build --parallel
            docker compose -f ${{ env.COMPOSE_FILE }} up -d
            docker image prune -f

  # =============================================================================
  # Run Database Migrations
  # =============================================================================
  migrate:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Run migrations via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            docker compose -f ${{ env.COMPOSE_FILE }} exec -T api npx tsx src/database/migrator.ts

  # =============================================================================
  # Health Check
  # =============================================================================
  health-check:
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Wait for services
        run: sleep 15

      - name: Check API health
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            https://api.iqon-ia.com/api/v1/health

      - name: Check App
        run: |
          curl --fail --retry 3 --retry-delay 5 \
            https://app.iqon-ia.com

      - name: Check Landing
        run: |
          curl --fail --retry 3 --retry-delay 5 \
            https://iqon-ia.com
